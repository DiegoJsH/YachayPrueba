spring.application.name=YachayTinkiy

# ========================================
# PostgreSQL Configuration
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA/Hibernate (create-drop -> para borrar DB)
# ========================================
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# Thymeleaf Configuration
# ========================================
# Habilitar Thymeleaf (habilitado por defecto)
spring.thymeleaf.enabled=true

# Modo de plantillas (HTML5 es el est\u00e1ndar)
spring.thymeleaf.mode=HTML

# Codificaci\u00f3n de caracteres
spring.thymeleaf.encoding=UTF-8

# Ubicaci\u00f3n de las plantillas (por defecto: classpath:/templates/)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Cach\u00e9 de plantillas (false en desarrollo para ver cambios inmediatos)
spring.thymeleaf.cache=false

# ========================================
# Spring Security Configuration
# ========================================
# Nivel de logging para debugging (cambiar a INFO en producci\u00f3n)
logging.level.org.springframework.security=DEBUG

# Configuraci\u00f3n de sesiones
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=YACHAYTINKIY_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ========================================
# Server Configuration
# ========================================
server.port=8080

# Mensajes de error personalizados
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=on_param

# ========================================
# Static Resources Configuration
# ========================================
# Ubicaci\u00f3n de recursos est\u00e1ticos
spring.web.resources.static-locations=classpath:/static/

# Cache de recursos est\u00e1ticos (false en desarrollo)
spring.web.resources.cache.period=0

