<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
    <head>
        <title>Registro de Alumno - Yachay T'inkiy</title>
    </head>
    <body>
        <div th:fragment="content" class="auth-container">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-5">
                        <div class="auth-card">
                            <!-- Header -->
                            <div class="auth-header">
                                <i class="fas fa-user-graduate fa-3x mb-3"></i>
                                <h2>Crear Cuenta de Alumno</h2>
                                <p class="mb-0 opacity-75">Comienza tu viaje de aprendizaje</p>
                            </div>

                            <!-- Body -->
                            <div class="auth-body">
                                <!-- Mensaje de error -->
                                <div th:if="${errorMessage}" class="alert alert-danger">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    <span th:text="${errorMessage}"></span>
                                </div>

                                <!-- Formulario de Registro -->
                                <form th:action="@{/registro/alumno}" 
                                      method="post" 
                                      th:object="${registroAlumnoDTO}">

                                    <div class="mb-3">
                                        <label for="nombreCompleto" class="form-label">
                                            <i class="fas fa-user me-1"></i>
                                            Nombre Completo
                                        </label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="nombreCompleto" 
                                               th:field="*{nombreCompleto}"
                                               placeholder="Ej: Juan Pérez García"
                                               required>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombreCompleto')}" 
                                             th:errors="*{nombreCompleto}">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="email" class="form-label">
                                            <i class="fas fa-envelope me-1"></i>
                                            Correo Electrónico
                                        </label>
                                        <input type="email" 
                                               class="form-control" 
                                               id="email" 
                                               th:field="*{email}"
                                               placeholder="tu@email.com"
                                               required>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" 
                                             th:errors="*{email}">
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="password" class="form-label">
                                            <i class="fas fa-lock me-1"></i>
                                            Contraseña
                                        </label>
                                        <input type="password" 
                                               class="form-control" 
                                               id="password" 
                                               th:field="*{password}"
                                               placeholder="Mínimo 8 caracteres"
                                               required>
                                        <div class="form-text">
                                            <i class="fas fa-info-circle me-1"></i>
                                            Mínimo 8 caracteres, incluir mayúsculas, minúsculas y números
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" 
                                             th:errors="*{password}">
                                        </div>
                                    </div>

                                    <div class="mb-3 form-check">
                                        <input type="checkbox" 
                                               class="form-check-input" 
                                               id="terms" 
                                               required>
                                        <label class="form-check-label" for="terms">
                                            Acepto los <a href="#">términos y condiciones</a>
                                        </label>
                                    </div>

                                    <!-- Token CSRF -->
                                    <input type="hidden" 
                                           th:name="${_csrf.parameterName}" 
                                           th:value="${_csrf.token}"/>

                                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                                        <i class="fas fa-user-plus me-2"></i>
                                        Crear Cuenta
                                    </button>
                                </form>

                                <!-- Links adicionales -->
                                <div class="text-center mt-4">
                                    <hr>
                                    <p class="mb-2">
                                        ¿Eres docente? 
                                        <a th:href="@{/registro/docente}" class="text-decoration-none fw-bold">
                                            Regístrate como docente
                                        </a>
                                    </p>
                                    <p class="mb-0">
                                        ¿Ya tienes cuenta? 
                                        <a th:href="@{/login}" class="text-decoration-none fw-bold">
                                            Inicia sesión
                                        </a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
