<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
    <head>
        <title>Iniciar Sesión - Yachay T'inkiy</title>
    </head>
    <body>
        <div th:fragment="content" class="auth-container">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-5">
                        <div class="auth-card">
                            <!-- Header -->
                            <div class="auth-header">
                                <i class="fas fa-sign-in-alt fa-3x mb-3"></i>
                                <h2>Iniciar Sesión</h2>
                                <p class="mb-0 opacity-75">Bienvenido de vuelta</p>
                            </div>

                            <!-- Body -->
                            <div class="auth-body">
                                <!-- Mensaje de éxito (después de registro) -->
                                <div th:if="${param.registered}" class="alert alert-success">
                                    <i class="fas fa-check-circle me-2"></i>
                                    ¡Cuenta creada exitosamente! Ya puedes iniciar sesión.
                                </div>

                                <!-- Mensaje de error -->
                                <div th:if="${param.error}" class="alert alert-danger">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    Email o contraseña incorrectos
                                </div>

                                <!-- Mensaje de logout -->
                                <div th:if="${param.logout}" class="alert alert-info">
                                    <i class="fas fa-info-circle me-2"></i>
                                    Has cerrado sesión exitosamente
                                </div>

                                <!-- Formulario de Login -->
                                <form th:action="@{/login}" method="post">
                                    <div class="mb-3">
                                        <label for="username" class="form-label">
                                            <i class="fas fa-envelope me-1"></i>
                                            Correo Electrónico
                                        </label>
                                        <input type="email" 
                                               class="form-control form-control-lg" 
                                               id="username" 
                                               name="username" 
                                               placeholder="tu@email.com"
                                               required 
                                               autofocus>
                                    </div>

                                    <div class="mb-3">
                                        <label for="password" class="form-label">
                                            <i class="fas fa-lock me-1"></i>
                                            Contraseña
                                        </label>
                                        <input type="password" 
                                               class="form-control form-control-lg" 
                                               id="password" 
                                               name="password" 
                                               placeholder="••••••••"
                                               required>
                                    </div>

                                    <div class="mb-3 form-check">
                                        <input type="checkbox" 
                                               class="form-check-input" 
                                               id="remember-me" 
                                               name="remember-me">
                                        <label class="form-check-label" for="remember-me">
                                            Recordarme
                                        </label>
                                    </div>

                                    <!-- Token CSRF -->
                                    <input type="hidden" 
                                           th:name="${_csrf.parameterName}" 
                                           th:value="${_csrf.token}"/>

                                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>
                                        Iniciar Sesión
                                    </button>
                                </form>

                                <!-- Links adicionales -->
                                <div class="text-center mt-4">
                                    <p class="text-muted mb-2">
                                        <a href="#" class="text-decoration-none">
                                            ¿Olvidaste tu contraseña?
                                        </a>
                                    </p>
                                    <hr>
                                    <p class="mb-0">
                                        ¿No tienes cuenta? 
                                        <a th:href="@{/registro/alumno}" class="text-decoration-none fw-bold">
                                            Regístrate aquí
                                        </a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
