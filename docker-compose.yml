version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proyecto_herramientas_db
    environment:
      POSTGRES_DB: herramientas_db
      POSTGRES_USER: herramientas_user
      POSTGRES_PASSWORD: herramientas_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herramientas_user -d herramientas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
